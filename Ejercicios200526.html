<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ejercicio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#ffffff;
}

/* Título */
header{
    height:60px;
    display:flex;
    align-items:center;
    padding-left:20px;
    font-size:42px;
    color:#1f1f1f;
}

/* Área principal */
.container{
    position:relative;
    width:100%;
    height:520px;

    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
}

/* Cuadros superiores */
.top-left,
.top-right{
    background:#d2a000;
}

/* Cuadros inferiores */
.bottom-left,
.bottom-right{
    background:#4fa4df;
}

/* Línea vertical central */
.container::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:2px;
    height:100%;
    background:rgba(255,255,255,0.15);
}

/* Línea horizontal central */
.container::after{
    content:"";
    position:absolute;
    top:50%;
    left:0;
    transform:translateY(-50%);
    width:100%;
    height:2px;
    background:rgba(255,255,255,0.15);
}

/* Círculo central */
.circle{
    position:absolute;

    width:110px;
    height:110px;

    background:white;
    border-radius:50%;

    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    box-shadow:
        0 0 20px rgba(255,255,255,0.9),
        0 0 40px rgba(255,255,255,0.7),
        0 0 60px rgba(255,255,255,0.5);
}

</style>
</head>

<body>

<header>
    Ejercicio
</header>

<div class="container">

    <div class="top-left"></div>
    <div class="top-right"></div>

    <div class="bottom-left"></div>
    <div class="bottom-right"></div>

    <div class="circle"></div>

</div>

</body>
</html>
