<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENA | Plataforma de Gestión</title>
    <style>
        /* --- 1. CONFIGURACIÓN GLOBAL --- */
        :root {
            --primary: #39a900; /* Verde SENA */
            --glass: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fondo: Ciudad nocturna */
            background-image: url('https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* --- 2. FILTRO DE LECTIBILIDAD (EL "SCRIM") --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,50,0,0.4));
            z-index: 0;
        }

        /* --- 3. CONTENEDOR DE LOGIN (GLASSMORPHISM) --- */
        .login-box {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            color: var(--text-main);
        }

        h2 { margin: 0 0 10px 0; font-weight: 600; }
        p { margin-bottom: 30px; opacity: 0.7; font-size: 0.9rem; }

        /* --- 4. ELEMENTOS DEL FORMULARIO --- */
        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <main class="login-box">
        <h2>SENA</h2>
        <p>Centro de Innovación y Desarrollo</p>
        
        <form id="loginForm">
            <input type="text" class="input-field" placeholder="ID Usuario" required>
            <input type="password" class="input-field" placeholder="Contraseña" required>
            <button type="submit" class="btn-login">INGRESAR AL SISTEMA</button>
        </form>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Validando credenciales en el Centro de Innovación...');
        });
    </script>
</body>
</html>
