<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ejemplo justify-content Flexbox</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{
    background:#101820;
    color:white;
    padding:40px;
}


/* CONTENEDOR GENERAL */

.contenedor{

    display:flex;
    flex-direction:row;
    justify-content:center;
    align-items:center;
    gap:20px;

    background:#1e293b;
    padding:30px;
    margin-bottom:40px;
    border-radius:15px;

}


/* TARJETAS */

.card{

    width:150px;
    height:120px;

    background:linear-gradient(
        135deg,
        #00c6ff,
        #0072ff
    );

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:15px;

    font-size:22px;
    font-weight:bold;

}


/* EJEMPLOS */

.start{
    justify-content:flex-start;
}


.end{
    justify-content:flex-end;
}


.center{
    justify-content:center;
}


.between{
    justify-content:space-between;
}


.around{
    justify-content:space-around;
}


.evenly{
    justify-content:space-evenly;
}



h2{
    margin:20px 0;
}

</style>

</head>

<body>


<h1>Ejemplos de justify-content</h1>


<h2>flex-start (inicio)</h2>

<div class="contenedor start">

    <div class="card">1</div>
    <div class="card">2</div>
    <div class="card">3</div>

</div>



<h2>flex-end (final)</h2>

<div class="contenedor end">

    <div class="card">1</div>
    <div class="card">2</div>
    <div class="card">3</div>

</div>



<h2>center (centro)</h2>

<div class="contenedor center">

    <div class="card">1</div>
    <div class="card">2</div>
    <div class="card">3</div>

</div>



<h2>space-between (espacio entre elementos)</h2>

<div class="contenedor between">

    <div class="card">1</div>
    <div class="card">2</div>
    <div class="card">3</div>

</div>



<h2>space-around (espacio alrededor)</h2>

<div class="contenedor around">

    <div class="card">1</div>
    <div class="card">2</div>
    <div class="card">3</div>

</div>



<h2>space-evenly (espacio igual)</h2>

<div class="contenedor evenly">

    <div class="card">1</div>
    <div class="card">2</div>
    <div class="card">3</div>

</div>


</body>
</html>
