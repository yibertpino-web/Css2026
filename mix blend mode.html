<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide Transform + Blend Mode</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050814;
    padding:40px;
}

/* GRID */
.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

/* CARD */
.card{
    position:relative;
    height:260px;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.6);
}

/* IMAGEN */
.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CAPA */
.overlay{
    position:absolute;
    inset:0;
    opacity:.7;
}

/* TEXTO */
.texto{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:28px;
    font-weight:bold;
    color:white;
    letter-spacing:3px;
}

/* ========================= */
/* SLIDE + TRANSFORM */
/* ========================= */

/* MULTIPLY */
.multiply .overlay{
    background:#ff0040;
    mix-blend-mode:multiply;
    animation:slideX 6s infinite linear;
}

/* SCREEN */
.screen .overlay{
    background:#00ffff;
    mix-blend-mode:screen;
    animation:slideY 6s infinite linear;
}

/* OVERLAY */
.overlay-mode .overlay{
    background:#ffcc00;
    mix-blend-mode:overlay;
    animation:zoom 6s infinite ease-in-out;
}

/* DARKEN */
.darken .overlay{
    background:#ff00ff;
    mix-blend-mode:darken;
    animation:rotate 8s infinite linear;
}

/* LIGHTEN */
.lighten .overlay{
    background:#00ff88;
    mix-blend-mode:lighten;
    animation:slideDiagonal 7s infinite linear;
}

/* ANIMACIONES SLIDE / TRANSFORM */

@keyframes slideX{
    0%{transform:translateX(-120px);}
    50%{transform:translateX(120px);}
    100%{transform:translateX(-120px);}
}

@keyframes slideY{
    0%{transform:translateY(-120px);}
    50%{transform:translateY(120px);}
    100%{transform:translateY(-120px);}
}

@keyframes zoom{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

@keyframes rotate{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@keyframes slideDiagonal{
    0%{transform:translate(-80px,-80px);}
    50%{transform:translate(80px,80px);}
    100%{transform:translate(-80px,-80px);}
}

h1{
    text-align:center;
    color:white;
    margin-bottom:30px;
}

</style>
</head>
<body>

<h1>Slide Transform + Mix Blend Mode</h1>

<div class="galeria">

    <div class="card multiply">
        <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=800&q=80">
        <div class="overlay"></div>
        <div class="texto">Multiply</div>
    </div>

    <div class="card screen">
        <img src="https://images.unsplash.com/photo-1508051123996-69f8caf4891d?auto=format&fit=crop&w=800&q=80">
        <div class="overlay"></div>
        <div class="texto">Screen</div>
    </div>

    <div class="card overlay-mode">
        <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=800&q=80">
        <div class="overlay"></div>
        <div class="texto">Overlay</div>
    </div>

    <div class="card darken">
        <img src="https://images.unsplash.com/photo-1499084732479-de2c02d45fc4?auto=format&fit=crop&w=800&q=80">
        <div class="overlay"></div>
        <div class="texto">Darken</div>
    </div>

    <div class="card lighten">
        <img src="https://images.unsplash.com/photo-1514565131-fce0801e5785?auto=format&fit=crop&w=800&q=80">
        <div class="overlay"></div>
        <div class="texto">Lighten</div>
    </div>

</div>

</body>
</html>
