<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala de Internet - Pseudoclases CSS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:url("https://images.unsplash.com/photo-1496171367470-9ed9a91ea931?q=80&w=1920")
    center/cover no-repeat;
}

/* Capa oscura */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.75);
}

/* Luces animadas */
body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    background:radial-gradient(circle,
    rgba(0,255,255,.4),
    transparent 70%);
    animation:moverLuz 8s infinite alternate ease-in-out;
}

@keyframes moverLuz{
    from{
        transform:translate(-300px,-150px);
    }
    to{
        transform:translate(300px,150px);
    }
}

.panel{
    position:relative;
    z-index:10;

    width:750px;
    max-width:90%;

    background:rgba(255,255,255,.1);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.2);
    border-radius:25px;

    padding:35px;
    color:white;

    box-shadow:0 0 40px rgba(0,255,255,.25);

    animation:flotar 4s infinite ease-in-out;
}

@keyframes flotar{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

h1{
    text-align:center;
    margin-bottom:10px;
    animation:brillo 3s infinite alternate;
}

@keyframes brillo{
    from{
        text-shadow:0 0 10px cyan;
    }
    to{
        text-shadow:0 0 30px cyan;
    }
}

p{
    text-align:center;
    margin-bottom:25px;
    color:#ddd;
}

.seccion{
    margin-bottom:20px;
}

/* HOVER */

.btn-hover{
    background:#00bcd4;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    transition:.4s;
}

.btn-hover:hover{
    background:#00e676;
    transform:translateY(-5px) scale(1.1);
}

/* ACTIVE */

.btn-active{
    background:#ff5252;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
}

.btn-active:active{
    transform:scale(.9);
    background:black;
}

/* INPUTS */

input[type="text"]{
    width:100%;
    padding:12px;
    margin-top:8px;

    border:none;
    border-radius:10px;

    transition:.4s;
}

/* FOCUS */

input[type="text"]:focus{
    outline:none;
    box-shadow:0 0 20px gold;
    transform:scale(1.02);
}

/* LINK */

a:link{
    color:#4fc3f7;
}

/* VISITED */

a:visited{
    color:#ba68c8;
}

/* CHECKED */

input[type="checkbox"]:checked{
    transform:scale(1.6);
}

/* ENABLED */

input:enabled{
    border:2px solid #00e676;
}

/* DISABLED */

input:disabled{
    background:#cfd8dc;
    color:#444;
    cursor:not-allowed;
}

label{
    display:block;
    margin-bottom:5px;
}

.barra{
    width:100%;
    height:8px;
    border-radius:20px;
    background:rgba(255,255,255,.2);
    overflow:hidden;
    margin-top:25px;
}

.progreso{
    height:100%;
    width:30%;
    background:linear-gradient(90deg,cyan,lime);
    animation:cargar 4s infinite;
}

@keyframes cargar{
    0%{
        width:10%;
    }
    50%{
        width:90%;
    }
    100%{
        width:10%;
    }
}

</style>
</head>
<body>

<div class="panel">

    <h1>💻 SALA DE INTERNET PROFESIONAL</h1>

    <p>
        Ejemplo de Pseudoclases de Interacción con Animaciones
    </p>

    <div class="seccion">
        <button class="btn-hover">
            Hover
        </button>
    </div>

    <div class="seccion">
        <button class="btn-active">
            Active
        </button>
    </div>

    <div class="seccion">
        <label>Focus</label>
        <input type="text" placeholder="Haz clic aquí">
    </div>

    <div class="seccion">
        <label>Link y Visited</label>
        <a href="https://www.google.com" target="_blank">
            Abrir Google
        </a>
    </div>

    <div class="seccion">
        <label>
            <input type="checkbox">
            Checked
        </label>
    </div>

    <div class="seccion">
        <label>Enabled</label>
        <input type="text" value="Campo habilitado">
    </div>

    <div class="seccion">
        <label>Disabled</label>
        <input type="text" value="Campo deshabilitado" disabled>
    </div>

    <div class="barra">
        <div class="progreso"></div>
    </div>

</div>

</body>
</html>
